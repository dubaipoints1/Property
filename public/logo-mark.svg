<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" role="img" aria-label="DubaiPoints mark">
  <!-- F.15.2 — navy roundel with centred NE chevron arrow.
       viewBox tightened to 0-60 so the circle fills edge-to-edge
       (no halo). Arrow rebuilt as a symmetric chevron — shaft
       19,41 → 41,19 (midpoint 30,30), chevron arms 30,19 → 41,19
       → 41,30. Visual centroid lands on the circle centre.
       Reads as "arrow" at 16x16. Hard-coded #1f3a4d for filesystem
       favicon (no currentColor fallback issues across browsers). -->
  <circle cx="30" cy="30" r="30" fill="#1f3a4d" />
  <g fill="none" stroke="#ffffff" stroke-width="5.5"
     stroke-linecap="round" stroke-linejoin="round">
    <path d="M 19 41 L 41 19" />
    <path d="M 30 19 L 41 19 L 41 30" />
  </g>
</svg>
