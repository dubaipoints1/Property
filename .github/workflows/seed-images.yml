      - name: Run validation
        run: |
          npm run check
          npm test

      - name: Show manifest summary
        run: |
          echo "Manifest entries:"
          node -e "const m=require('./data/stock/manifest.json'); console.log(m.entries.length+' entries'); m.entries.forEach(e => console.log('  '+e.slug+' ('+e.width+'×'+e.height+') by '+e.photographer));"

      - name: Commit and push seeded images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/stock/manifest.json public/images/stock/
          if git diff --staged --quiet; then
            echo "No new images to commit."
            exit 0
          fi
          # Dynamic commit count (PR-#170 chairman T1 follow-up): the
          # previous hardcoded "12 Pexels stock photos" line was stale once
          # the workflow grew to 70+ fetch steps and into --replace re-fetch
          # cycles. Count the actual diff so the message reflects what
          # landed (new vs refreshed).
          IMG_ADDED=$(git diff --staged --diff-filter=A --name-only -- public/images/stock | wc -l | tr -d ' ')
          IMG_MODIFIED=$(git diff --staged --diff-filter=M --name-only -- public/images/stock | wc -l | tr -d ' ')
          IMG_TOTAL=$((IMG_ADDED + IMG_MODIFIED))
          if [ "$IMG_ADDED" -gt 0 ] && [ "$IMG_MODIFIED" -gt 0 ]; then
            COUNT_LINE="${IMG_TOTAL} Pexels stock photos (${IMG_ADDED} new, ${IMG_MODIFIED} refreshed)"
          elif [ "$IMG_MODIFIED" -gt 0 ]; then
            COUNT_LINE="${IMG_MODIFIED} Pexels stock photos refreshed via --replace"
          else
            COUNT_LINE="${IMG_TOTAL} Pexels stock photos"
          fi
          git commit \
            -m "feat(images): Phase E.2 seed — ${COUNT_LINE}" \
            -m "Automated fetch via .github/workflows/seed-images.yml. Each manifest entry carries full provenance (photographer name + URL, Pexels photo ID, source URL, Pexels licence). Per Charter §'No advertorial-driven recommendations', attribution renders via <ImageCredit> on every consumer page."
          git push origin HEAD:${{ inputs.branch || github.ref_name }}
