# One-shot Pexels seed — Phase E.2 hands-off image fetch.
#
# Why this workflow exists:
#   The Claude sandbox is blocked from reaching api.pexels.com /
#   images.pexels.com / unsplash / pixabay / wikimedia at the network
#   allowlist layer. GitHub Actions runners are not, so the Pexels
#   fetcher script (scripts/images/fetch-stock.ts) runs cleanly here.
#
# How to use:
#   1. In the repo settings → Secrets and variables → Actions, add
#      a secret named PEXELS_API_KEY (free key from
#      https://www.pexels.com/api/).
#   2. Go to Actions → "seed-images" → Run workflow.
#   3. Pick the branch (e.g. claude/check-latest-updates-GkRze).
#   4. Click Run. The workflow fetches every seeded photo, writes
#      manifest entries, commits, and pushes to the same branch.
#
# What it fetches:
#   ~68 slugs covering every <StockImage> reference site-wide: homepage
#   hero, wallet, every active /cards/<slug>/ hero, every /banks/<slug>/
#   hero, every /guides/ hero, every /airlines/ programme hero, news,
#   deals. See scripts/images/fetch-stock.ts for the script the slugs
#   feed.
#
# Re-runnability (PR #167):
#   fetch-stock.ts is idempotent — existing manifest slugs no-op (log
#   SKIP and exit 0, no Pexels call). So the workflow is safe to re-run
#   any time. First seed-images run on a fresh repo fetches everything;
#   subsequent runs only fetch genuinely-new slugs. Pass --replace on a
#   per-step run override to force a refetch.
#
# Editorial guardrails:
#   - Pexels licence is "free to use, attribution not required" — we
#     attribute anyway via <ImageCredit>, per Charter §"No advertorial-
#     driven recommendations" (transparency on every surface).
#   - Per-slug query strings are conservative editor picks. If a
#     result looks wrong for its context, re-run with `--pick 2/3/4`
#     to grab a different result from the same search.
#   - Each fetch hits the Pexels API once; free tier is 200/hour, so
#     the ~68 calls in this workflow use ~34% of an hour's quota on the
#     first full seed.

name: seed-images

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to seed (commits land here)"
        required: true
        default: "claude/check-latest-updates-GkRze"
        type: string
  # Push trigger — re-running this workflow on a checked-in branch when
  # the file changes lets the Chairman re-fetch without clicking through
  # the Actions UI. The workflow checks out the branch the push came in
  # on (github.ref_name) when no workflow_dispatch input is provided.
  # GITHUB_TOKEN-authored pushes never re-trigger by default, so the
  # workflow's own commit at the end won't cause a loop.
  push:
    branches:
      - "claude/**"
    paths:
      - ".github/workflows/seed-images.yml"

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || github.ref_name }}
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Fetch hero-cabin
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: |
          npm run fetch:stock -- \
            --slug hero-cabin \
            --query "business class window seat sunset" \
            --orientation landscape \
            --alt "Window seat in a premium cabin at sunset" \
            --usage "homepage hero"

      - name: Fetch wallet-hero-cards
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
