# Weekly card-data refresh — "always on" since 2026-05-08.
#
# Runs every Sunday 23:00 UTC, on workflow_dispatch (with optional single-
# bank override), and on any direct edit to this file, scraper code, or a
# per-bank URL config (path-scoped push trigger).
#
# Iterates the bank registry at scripts/scrape/banks.registry.json. New
# banks are added by appending to that JSON; this workflow file does not
# need to be edited.
#
# Always commits a run log to LATEST_RUN.log (repo root) so failures are
# inspectable from outside the runner.

name: scrape

on:
  schedule:
    - cron: "0 23 * * 0"
  workflow_dispatch:
    inputs:
      bank:
        description: "Bank slug to scrape (or 'all' for the full registry)"
        required: false
        default: "all"
        type: string
  push:
    branches:
      - main
    paths:
      - .github/workflows/scrape.yml
      - scripts/scrape/**.ts
      - scripts/scrape/banks/*.urls.json
      - scripts/scrape/banks.registry.json

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Resolve banks to scrape
        id: banks
        run: |
          # Honour the workflow_dispatch input when present; otherwise scrape every
          # bank in the registry. The cron and push triggers always pass through
          # the empty default and scrape all.
          INPUT="${{ github.event.inputs.bank }}"
          if [ -z "$INPUT" ] || [ "$INPUT" = "all" ]; then
            BANKS=$(node -e 'process.stdout.write(JSON.parse(require("fs").readFileSync("scripts/scrape/banks.registry.json","utf8")).banks.join(" "))')
          else
            BANKS="$INPUT"
          fi
          echo "banks=$BANKS" >> "$GITHUB_OUTPUT"
          echo "Scraping: $BANKS"

      - name: Run scrape with full logging
        id: scrape
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
        run: |
          set +e
          LOG=LATEST_RUN.log
          : > "$LOG"

          echo "=== node + npm versions ===" | tee -a "$LOG"
          node --version 2>&1 | tee -a "$LOG"
          npm --version 2>&1 | tee -a "$LOG"
          echo "" | tee -a "$LOG"

          echo "=== npm install ===" | tee -a "$LOG"
          npm install --no-audit --no-fund 2>&1 | tee -a "$LOG"
          INSTALL_RC=${PIPESTATUS[0]}
          echo "[install] exit=$INSTALL_RC" | tee -a "$LOG"
          if [ "$INSTALL_RC" -ne 0 ]; then echo "FAIL: install" | tee -a "$LOG"; exit 0; fi

          BANKS="${{ steps.banks.outputs.banks }}"
          for BANK in $BANKS; do
            echo "=== npm run scrape:$BANK ===" | tee -a "$LOG"
            npm run "scrape:$BANK" 2>&1 | tee -a "$LOG"
            BANK_RC=${PIPESTATUS[0]}
            echo "[$BANK] exit=$BANK_RC" | tee -a "$LOG"
            echo "" | tee -a "$LOG"
            # Continue on per-bank failure; one bank's outage must not abort
            # the others. Errors get surfaced in LATEST_RUN.log and PR_BODY.md.
          done

          echo "=== npm run scrape:propose ===" | tee -a "$LOG"
          # propose-changes iterates every directory under data/scraped/, so
          # it picks up every bank that wrote a snapshot in this run plus
          # any bank that wrote in a prior run that hasn't been merged yet.
          npm run scrape:propose 2>&1 | tee -a "$LOG"
          echo "" | tee -a "$LOG"

          echo "=== git status src/data/cards.json ===" | tee -a "$LOG"
          git status --porcelain src/data/cards.json 2>&1 | tee -a "$LOG"
          echo "" | tee -a "$LOG"

          if [ -f PR_BODY.md ]; then cp PR_BODY.md LATEST_SCRAPE.md; fi
          exit 0

      - name: Always commit log + diagnostic body to main
        if: always()
        run: |
          git config user.name "dubaipoints-bot"
          git config user.email "info@dubaipoints.ae"
          git add -f LATEST_RUN.log LATEST_SCRAPE.md 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "[diag] Nothing to commit."
          else
            git commit -m "diag(scrape): run log + body"
            git push origin main || echo "[diag] push failed"
          fi

      - name: Open PR if cards.json changed
        run: |
          # Audit-05: scraper writes to src/data/cards.json (the L2 data
          # layer), not to MDX content collection files. Detect changes
          # there.
          if [ -z "$(git status --porcelain src/data/cards.json)" ]; then
            echo "[scrape] No cards.json changes; skipping PR."
            exit 0
          fi
          BRANCH="scrape/weekly-$(date +%Y-%m-%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git add -A src/data/cards.json
          git commit -m "scrape: weekly card refresh ($(date +%Y-%m-%d))"
          git push -u origin "$BRANCH"
          # Audit-07: dropped --label flag because the labels "scrape" and
          # "needs-review" don't exist in this repo and gh pr create errors
          # out on missing labels. PRs still open cleanly without them; if
          # we want labels later, create them once via the GitHub UI and
          # reintroduce --label.
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "scrape: weekly card refresh ($(date +%Y-%m-%d))" \
            --body-file PR_BODY.md
        env:
          GH_TOKEN: ${{ github.token }}
