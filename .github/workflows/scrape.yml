# Weekly card-data refresh.
#
# Runs every Sunday 23:00 UTC, on workflow_dispatch, and on any direct
# edit to this file (path-scoped push trigger).
#
# Always commits a run log to LATEST_RUN.log (repo root) so we can
# inspect failures from outside the runner.

name: scrape

on:
  schedule:
    - cron: "0 23 * * 0"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/scrape.yml

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Run scrape with full logging
        id: scrape
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
        run: |
          set +e
          LOG=LATEST_RUN.log
          : > "$LOG"

          echo "=== node + npm versions ===" | tee -a "$LOG"
          node --version 2>&1 | tee -a "$LOG"
          npm --version 2>&1 | tee -a "$LOG"
          echo "" | tee -a "$LOG"

          echo "=== npm install ===" | tee -a "$LOG"
          npm install --no-audit --no-fund 2>&1 | tee -a "$LOG"
          INSTALL_RC=${PIPESTATUS[0]}
          echo "[install] exit=$INSTALL_RC" | tee -a "$LOG"
          if [ "$INSTALL_RC" -ne 0 ]; then echo "FAIL: install" | tee -a "$LOG"; exit 0; fi

          # ── Firecrawl /v1/map: discover real FAB credit-card URLs ─────
          echo "=== Firecrawl /v1/map: bankfab.com (credit card) ===" | tee -a "$LOG"
          curl -sS -X POST https://api.firecrawl.dev/v1/map \
            -H "Authorization: Bearer $FIRECRAWL_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"url":"https://www.bankfab.com","search":"credit card","limit":100}' \
            -o /tmp/map.json
          echo "[map] response head:" | tee -a "$LOG"
          head -c 2000 /tmp/map.json 2>&1 | tee -a "$LOG"
          echo "" | tee -a "$LOG"
          echo "[map] all URLs (filtered to credit-card / cards):" | tee -a "$LOG"
          if command -v jq >/dev/null 2>&1; then
            jq -r '.links[]?' /tmp/map.json 2>/dev/null \
              | grep -iE 'credit.?card|/cards/' \
              | sort -u \
              | tee -a "$LOG"
          else
            echo "[map] jq not available, dumping raw" | tee -a "$LOG"
            cat /tmp/map.json | tee -a "$LOG"
          fi
          echo "" | tee -a "$LOG"

          # ── Existing scrape pipeline against fab.urls.json (still 404 territory until we update) ──
          echo "=== npm run scrape:fab ===" | tee -a "$LOG"
          npm run scrape:fab 2>&1 | tee -a "$LOG"
          echo "" | tee -a "$LOG"

          echo "=== npm run scrape:propose ===" | tee -a "$LOG"
          npm run scrape:propose 2>&1 | tee -a "$LOG"
          echo "" | tee -a "$LOG"

          if [ -f PR_BODY.md ]; then cp PR_BODY.md LATEST_SCRAPE.md; fi
          exit 0

      - name: Always commit log + diagnostic body to main
        if: always()
        run: |
          git config user.name "dubaipoints-bot"
          git config user.email "info@dubaipoints.ae"
          git add -f LATEST_RUN.log LATEST_SCRAPE.md 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "[diag] Nothing to commit."
          else
            git commit -m "diag(scrape): run log + body"
            git push origin main || echo "[diag] push failed"
          fi

      - name: Open PR if cards changed
        run: |
          if git diff --quiet src/content/cards/; then
            echo "[scrape] No card MDX changes; skipping PR."
            exit 0
          fi
          BRANCH="scrape/weekly-$(date +%Y-%m-%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git add src/content/cards/
          git commit -m "scrape: weekly card refresh ($(date +%Y-%m-%d))"
          git push -u origin "$BRANCH"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "scrape: weekly card refresh ($(date +%Y-%m-%d))" \
            --body-file PR_BODY.md \
            --label "scrape,needs-review"
        env:
          GH_TOKEN: ${{ github.token }}
