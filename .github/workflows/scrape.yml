# Weekly card-data refresh.
#
# Runs every Sunday 23:00 UTC (Monday 03:00 GST), after manual dispatch,
# and after any direct edit to this workflow file (path-scoped push trigger,
# used to fire a run from a phone without `gh workflow run`).
#
# Scrapes each bank's card pages via Firecrawl, normalises into draft MDX,
# and opens a PR with a side-by-side diff in the body.
#
# REQUIRED REPO SECRET (add at GitHub → Settings → Secrets → Actions):
#   - FIRECRAWL_API_KEY  (sign up at firecrawl.dev)
#
# REQUIRED REPO PERMISSIONS (set at GitHub → Settings → Actions → General →
# "Workflow permissions"):
#   - "Read and write permissions"
#   - "Allow GitHub Actions to create and approve pull requests"
#
# This workflow never auto-merges. Every weekly PR gets human-reviewed for
# at least the first 8 weeks per Audit Session 04 / Council Decision Karim.

name: scrape

on:
  schedule:
    - cron: "0 23 * * 0" # Sunday 23:00 UTC
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/scrape.yml

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Scrape FAB
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
        run: npm run scrape:fab

      - name: Propose changes
        run: npm run scrape:propose

      - name: Branch + commit if anything changed
        id: commit
        run: |
          git config user.name "dubaipoints-bot"
          git config user.email "info@dubaipoints.ae"
          BRANCH="scrape/weekly-$(date +%Y-%m-%d)"
          git checkout -b "$BRANCH"
          if git diff --quiet src/content/cards/; then
            echo "no_changes=true" >> "$GITHUB_OUTPUT"
            echo "[scrape] No card MDX changes detected; skipping PR."
            exit 0
          fi
          git add src/content/cards/
          git commit -m "scrape: weekly card refresh ($(date +%Y-%m-%d))"
          git push -u origin "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "no_changes=false" >> "$GITHUB_OUTPUT"

      - name: Open pull request
        if: steps.commit.outputs.no_changes == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ steps.commit.outputs.branch }}
        run: |
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "scrape: weekly card refresh ($(date +%Y-%m-%d))" \
            --body-file PR_BODY.md \
            --label "scrape,needs-review"
