# Weekly card-data refresh.
#
# Runs every Sunday 23:00 UTC, on workflow_dispatch, and on any direct
# edit to this file (path-scoped push trigger).
#
# Always commits a run log to LATEST_RUN.log (repo root) so we can
# inspect failures from outside the runner.

name: scrape

on:
  schedule:
    - cron: "0 23 * * 0"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/scrape.yml

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Run scrape with full logging
        id: scrape
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
        run: |
          set +e
          LOG=LATEST_RUN.log
          : > "$LOG"

          echo "=== node + npm versions ===" | tee -a "$LOG"
          node --version 2>&1 | tee -a "$LOG"
          npm --version 2>&1 | tee -a "$LOG"
          echo "" | tee -a "$LOG"

          echo "=== npm install ===" | tee -a "$LOG"
          npm install --no-audit --no-fund 2>&1 | tee -a "$LOG"
          INSTALL_RC=${PIPESTATUS[0]}
          echo "[install] exit=$INSTALL_RC" | tee -a "$LOG"

          if [ "$INSTALL_RC" -ne 0 ]; then
            echo "FAIL: install" | tee -a "$LOG"
            exit 0
          fi

          echo "=== FIRECRAWL_API_KEY presence check ===" | tee -a "$LOG"
          if [ -n "$FIRECRAWL_API_KEY" ]; then
            echo "FIRECRAWL_API_KEY: present (${#FIRECRAWL_API_KEY} chars)" | tee -a "$LOG"
          else
            echo "FIRECRAWL_API_KEY: MISSING from env" | tee -a "$LOG"
          fi
          echo "" | tee -a "$LOG"

          echo "=== npm run scrape:fab ===" | tee -a "$LOG"
          npm run scrape:fab 2>&1 | tee -a "$LOG"
          FAB_RC=${PIPESTATUS[0]}
          echo "[scrape:fab] exit=$FAB_RC" | tee -a "$LOG"
          echo "" | tee -a "$LOG"

          echo "=== ls data/scraped/fab/ ===" | tee -a "$LOG"
          ls -la data/scraped/fab/ 2>&1 | tee -a "$LOG"
          echo "" | tee -a "$LOG"

          echo "=== latest scrape JSON (first 200 lines) ===" | tee -a "$LOG"
          LATEST_JSON=$(ls -t data/scraped/fab/*.json 2>/dev/null | head -1)
          if [ -n "$LATEST_JSON" ]; then
            echo "FILE: $LATEST_JSON" | tee -a "$LOG"
            head -200 "$LATEST_JSON" 2>&1 | tee -a "$LOG"
          else
            echo "No scrape JSON written." | tee -a "$LOG"
          fi
          echo "" | tee -a "$LOG"

          echo "=== npm run scrape:propose ===" | tee -a "$LOG"
          npm run scrape:propose 2>&1 | tee -a "$LOG"
          PROPOSE_RC=${PIPESTATUS[0]}
          echo "[scrape:propose] exit=$PROPOSE_RC" | tee -a "$LOG"
          echo "" | tee -a "$LOG"

          if [ -f PR_BODY.md ]; then
            cp PR_BODY.md LATEST_SCRAPE.md
            echo "=== PR_BODY.md head ===" | tee -a "$LOG"
            head -80 PR_BODY.md 2>&1 | tee -a "$LOG"
          else
            echo "No PR_BODY.md produced." | tee -a "$LOG"
          fi

          exit 0

      - name: Always commit log + diagnostic body to main
        if: always()
        run: |
          git config user.name "dubaipoints-bot"
          git config user.email "info@dubaipoints.ae"
          # force-add so .gitignore doesn't drop them
          git add -f LATEST_RUN.log LATEST_SCRAPE.md 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "[diag] Nothing to commit."
          else
            git commit -m "diag(scrape): run log + body"
            git push origin main || echo "[diag] push failed"
          fi

      - name: Open PR if cards changed
        run: |
          if git diff --quiet src/content/cards/; then
            echo "[scrape] No card MDX changes; skipping PR."
            exit 0
          fi
          BRANCH="scrape/weekly-$(date +%Y-%m-%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git add src/content/cards/
          git commit -m "scrape: weekly card refresh ($(date +%Y-%m-%d))"
          git push -u origin "$BRANCH"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "scrape: weekly card refresh ($(date +%Y-%m-%d))" \
            --body-file PR_BODY.md \
            --label "scrape,needs-review"
        env:
          GH_TOKEN: ${{ github.token }}
